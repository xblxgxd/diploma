version: "3.8"

services:
  # 1. PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    container_name: bicycle-postgres
    environment:
      POSTGRES_DB: bicycle-service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hesus2016
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Ваш Node.js бэкенд
  backend:
    build: ./backend
    container_name: bicycle-backend
    ports:
      - "5000:5000"
    environment:
      DB_NAME: bicycle-service
      DB_USER: postgres
      DB_PASSWORD: Hesus2016
      DB_HOST: postgres  # ВАЖНО: имя сервиса, не localhost!
      DB_PORT: 5432
    # volumes:
    #   - ./backend:/app
    #   - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # 3. Ваш React фронтенд
  frontend:
    build: ./client/bicycle-service
    container_name: bicycle-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      CHOKIDAR_USEPOLLING: "true"  # Для hot reload в Windows
    # volumes:
    #   - ./client/bicycle-service:/app
    #   - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:


networks:
  default:
    name: bicycle-network